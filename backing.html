<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>褙膠效率填報</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.8/dist/flatly/bootstrap.min.css">
  <style>
    .ac-dropdown {
      position: absolute; top: 100%; left: 0; right: 0;
      background: #fff; border: 1px solid #dee2e6;
      border-radius: 0 0 .375rem .375rem;
      z-index: 300; max-height: 220px; overflow-y: auto;
      display: none; box-shadow: 0 4px 12px rgba(0,0,0,.12);
    }
    .ac-item { padding: 6px 12px; font-size: 13px; cursor: pointer; }
    .ac-item:hover, .ac-item.ac-active { background: #e7f1ff; }
    .ac-item mark { background: none; color: #0d6efd; font-weight: 700; padding: 0; }

    .row-entry {
      display: grid;
      grid-template-columns: 1fr 155px 68px 88px 95px 36px;
      gap: 6px; align-items: center; margin-bottom: 6px;
    }
    .head-row {
      display: grid;
      grid-template-columns: 1fr 155px 68px 88px 95px 36px;
      gap: 6px; padding-bottom: 6px;
      border-bottom: 1px solid #dee2e6; margin-bottom: 8px;
    }
    .head-row span { font-size: 11px; color: #6c757d; text-align: center; letter-spacing: .04em; }
    .head-row span:first-child { text-align: left; }

    .cell-coeff {
      background: #f1f3f4; border: 1px solid #dee2e6;
      border-radius: .375rem; padding: 5px 8px;
      text-align: center; color: #0d6efd; font-size: 13px;
    }
    .cell-eff {
      background: #cfe2ff; border: 1px solid #9ec5fe;
      border-radius: .375rem; padding: 5px 8px;
      text-align: center; font-weight: 600; font-size: 13px;
    }
    #total-eff { font-size: 17px; font-weight: 700; color: #0d6efd; }
    .toast-msg {
      position: fixed; top: 16px; right: 16px;
      padding: 10px 18px; border-radius: 8px; font-size: 14px;
      z-index: 9999; opacity: 0; transition: opacity .2s; pointer-events: none;
    }
    .toast-msg.show-success { background: #d1e7dd; color: #0f5132; opacity: 1; border: 1px solid #badbcc; }
    .toast-msg.show-error   { background: #f8d7da; color: #842029; opacity: 1; border: 1px solid #f5c2c7; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top shadow-sm bg-white">
  <div class="container-fluid">
    <span class="navbar-brand fw-bold">褙膠效率填報</span>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navLinks">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navLinks">
      <div class="navbar-nav ms-auto gap-1">
        <a class="nav-link" href="index.html">分條填報</a>
        <a class="nav-link" href="welding.html">焊接填報</a>
        <a class="nav-link" href="cutting.html">切勾填報</a>
        <a class="nav-link" href="report.html">報表總表</a>
        <a class="nav-link text-success fw-semibold" href="https://docs.google.com/spreadsheets/d/1mxgL9IR2uggzlIVRss0RDtb-3OX2ReUV0KpEFyrmm9k/edit" target="_blank">📊 Sheet</a>
      </div>
    </div>
  </div>
</nav>

<div class="container-fluid px-3 py-3">

  <!-- 頂部表單 -->
  <div class="card shadow-sm mb-3">
    <div class="card-body py-2">
      <div class="row g-2 align-items-end flex-wrap">
        <div class="col-auto">
          <label class="form-label small mb-1">生產日期</label>
          <input type="date" id="prod-date" class="form-control form-control-sm" style="width:150px">
        </div>
        <div class="col-auto" style="min-width:220px; position:relative">
          <label class="form-label small mb-1">員工（工號或姓名）</label>
          <input type="text" id="emp-input" class="form-control form-control-sm" placeholder="輸入工號或姓名…" autocomplete="off">
          <div class="ac-dropdown" id="emp-ac"></div>
        </div>
        <div class="col-auto">
          <label class="form-label small mb-1">上班時數</label>
          <input type="number" id="work-hours" class="form-control form-control-sm text-end" min="0" step="0.5" placeholder="8" style="width:80px">
        </div>
        <div class="col-auto">
          <label class="form-label small mb-1">異常時數</label>
          <input type="number" id="abnormal-hours" class="form-control form-control-sm text-end" min="0" step="0.5" placeholder="0" style="width:80px">
        </div>
        <div class="col-auto">
          <label class="form-label small mb-1">異常原因</label>
          <input type="text" id="abnormal-reason" class="form-control form-control-sm" placeholder="說明…" style="width:140px">
        </div>
        <div class="col-auto">
          <label class="form-label small mb-1">新人扣時%</label>
          <div class="input-group input-group-sm" style="width:90px">
            <input type="number" id="newbie-deduct" class="form-control form-control-sm text-end" min="0" max="100" step="1" placeholder="0">
            <span class="input-group-text">%</span>
          </div>
        </div>
        <div class="col">
          <span id="header-hint" class="text-muted small">請先選擇日期與員工</span>
        </div>
      </div>
    </div>
  </div>

  <!-- 明細列 -->
  <div class="card shadow-sm mb-3">
    <div class="card-body py-2 px-3">
      <div class="head-row">
        <span style="text-align:left">碼長</span>
        <span>規格分類</span><span>係數</span><span>卷數</span><span>效率換算</span><span></span>
      </div>
      <div id="rows"></div>
      <div id="loading-specs" class="text-muted small text-center py-2">載入係數中…</div>
    </div>
  </div>

  <!-- 底部合計 -->
  <div class="card shadow-sm">
    <div class="card-body py-2 d-flex align-items-center">
      <span class="text-muted small me-3">
        共 <strong id="row-count">0</strong> 筆　合計效率：<span id="total-eff">0.00</span>
      </span>
      <button id="btn-save" class="btn btn-primary ms-auto" disabled>儲存紀錄</button>
    </div>
  </div>

</div>

<div id="msg" class="toast-msg"></div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyKEIcvpKEeTG2iOdyEkIP93ofx1oCl4qLvs3WPvYw930uV8UY--xzYYR8Bgi1cRcol/exec';

let ITEMS      = {};   // { 碼長: { 規格分類: { coefficient } } }
let ITEM_KEYS  = [];
let specsReady = false;

let employees  = [];
let currentEmp = null;
let rowId      = 0;

document.addEventListener('DOMContentLoaded', () => {
  setDefaultDate();
  loadEmployees();
  loadSpecs();
  bindEmpAutocomplete();
  document.getElementById('btn-save').addEventListener('click', onSave);
});

function setDefaultDate() {
  document.getElementById('prod-date').value = new Date().toLocaleDateString('en-CA');
}

// ── 係數（JSONP）────────────────────────────────────────────
function loadSpecs() {
  jsonpCall(GAS_URL + '?action=getSpecs&system=backing', data => {
    if (data && data.items) {
      ITEMS      = data.items;
      ITEM_KEYS  = Object.keys(ITEMS);
      specsReady = true;
      document.getElementById('loading-specs').style.display = 'none';
      if (currentEmp) addRow();
    } else {
      document.getElementById('loading-specs').textContent = '係數載入失敗，請重新整理';
    }
  });
}

// ── 員工（JSONP）────────────────────────────────────────────
function loadEmployees() {
  jsonpCall(GAS_URL + '?action=getEmployees', data => {
    employees = Array.isArray(data) ? data : [];
  });
}

function bindEmpAutocomplete() {
  const input = document.getElementById('emp-input');
  const ac    = document.getElementById('emp-ac');
  let acIdx = -1;

  input.addEventListener('input', () => {
    const q = input.value.trim().toLowerCase();
    acIdx = -1;
    if (!q) { ac.style.display = 'none'; return; }
    const matches = employees.filter(e =>
      e.id.toLowerCase().includes(q) || e.name.toLowerCase().includes(q)
    );
    if (!matches.length) { ac.style.display = 'none'; return; }
    const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
    ac.innerHTML = matches.slice(0, 20).map((e, i) =>
      `<div class="ac-item" data-id="${e.id}" data-idx="${i}">
        ${e.id.replace(re,'<mark>$1</mark>')} ${e.name.replace(re,'<mark>$1</mark>')}
      </div>`
    ).join('');
    ac.style.display = 'block';
    ac.querySelectorAll('.ac-item').forEach(item =>
      item.addEventListener('mousedown', ev => { ev.preventDefault(); selectEmp(item.dataset.id); })
    );
  });

  input.addEventListener('keydown', e => {
    const items = ac.querySelectorAll('.ac-item');
    if (!items.length || ac.style.display === 'none') return;
    if (e.key === 'ArrowDown') { e.preventDefault(); acIdx = Math.min(acIdx+1, items.length-1); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); acIdx = Math.max(acIdx-1, 0); }
    else if ((e.key === 'Enter' || e.key === 'Tab') && acIdx >= 0) {
      e.preventDefault(); selectEmp(items[acIdx].dataset.id); return;
    } else if (e.key === 'Escape') { ac.style.display = 'none'; return; }
    items.forEach((el, i) => el.classList.toggle('ac-active', i === acIdx));
    if (items[acIdx]) items[acIdx].scrollIntoView({ block: 'nearest' });
  });

  input.addEventListener('blur', () => setTimeout(() => { ac.style.display = 'none'; }, 150));
}

function selectEmp(id) {
  const emp = employees.find(e => e.id === id);
  if (!emp) return;
  currentEmp = emp;
  document.getElementById('emp-input').value = `${emp.name} (${emp.id})`;
  document.getElementById('emp-ac').style.display = 'none';
  document.getElementById('header-hint').textContent = `${emp.name} 的班產記錄`;
  clearRows();
  if (specsReady) addRow();
  updateFooter();
}

// ── 行管理 ────────────────────────────────────────────────────
function addRow() {
  const id  = ++rowId;
  const div = document.createElement('div');
  div.className  = 'row-entry';
  div.dataset.id = id;
  div.innerHTML  = `
    <select class="form-select form-select-sm" data-field="category">
      <option value="">— 碼長 —</option>
      ${ITEM_KEYS.map(k => `<option value="${k}">${k}</option>`).join('')}
    </select>
    <select class="form-select form-select-sm" data-field="spec" disabled>
      <option value="">— 規格分類 —</option>
    </select>
    <div class="cell-coeff" data-field="coeff">—</div>
    <input class="form-control form-control-sm text-end" type="number" min="0" step="1" placeholder="卷數" data-field="rolls">
    <div class="cell-eff" data-field="eff">—</div>
    <button class="btn btn-sm btn-outline-danger py-0 px-2" type="button" onclick="deleteRow(${id})" title="刪除">✕</button>
  `;
  document.getElementById('rows').appendChild(div);
  bindRowEvents(div, id);
  div.querySelector('[data-field="category"]').focus();
}

function deleteRow(id) {
  const el = document.querySelector(`.row-entry[data-id="${id}"]`);
  if (el) el.remove();
  updateFooter();
}

function clearRows() {
  document.getElementById('rows').innerHTML = '';
  rowId = 0;
}

function getRows() {
  return Array.from(document.querySelectorAll('.row-entry')).map(row => ({
    category:   row.querySelector('[data-field="category"]').value,
    spec:       row.querySelector('[data-field="spec"]').value,
    coeff:      parseFloat(row.querySelector('[data-field="coeff"]').textContent) || 0,
    rolls:      parseFloat(row.querySelector('[data-field="rolls"]').value)       || 0,
    efficiency: parseFloat(row.querySelector('[data-field="eff"]').textContent)   || 0,
  }));
}

function updateFooter() {
  const valid = getRows().filter(r => r.efficiency > 0);
  const total = valid.reduce((s, r) => s + r.efficiency, 0);
  document.getElementById('row-count').textContent = valid.length;
  document.getElementById('total-eff').textContent = total.toFixed(2);
  document.getElementById('btn-save').disabled =
    !currentEmp || !valid.length || !document.getElementById('prod-date').value;
}

// ── 行事件 ────────────────────────────────────────────────────
function bindRowEvents(div, id) {
  const catSel     = div.querySelector('[data-field="category"]');
  const specSel    = div.querySelector('[data-field="spec"]');
  const rollsInput = div.querySelector('[data-field="rolls"]');

  catSel.addEventListener('change', () => {
    const cat = catSel.value;
    specSel.innerHTML = '<option value="">— 規格分類 —</option>';
    if (cat && ITEMS[cat]) {
      Object.keys(ITEMS[cat]).forEach(s => {
        specSel.innerHTML += `<option value="${s}">${s}</option>`;
      });
      specSel.disabled = false;
      specSel.focus();
    } else {
      specSel.disabled = true;
    }
    recalc();
  });

  specSel.addEventListener('change', () => {
    recalc();
    if (specSel.value) rollsInput.focus();
  });

  rollsInput.addEventListener('input', recalc);

  rollsInput.addEventListener('keydown', e => {
    if (e.key !== 'Tab' || e.shiftKey) return;
    e.preventDefault();
    const allRows = document.querySelectorAll('.row-entry');
    if (div === allRows[allRows.length - 1]) addRow();
    else div.nextElementSibling.querySelector('[data-field="category"]').focus();
  });

  function recalc() {
    const cat   = catSel.value;
    const spec  = specSel.value;
    const rolls = parseFloat(rollsInput.value) || 0;
    const entry = (cat && spec && ITEMS[cat]) ? ITEMS[cat][spec] : null;
    const coeff = entry ? entry.coefficient : null;
    div.querySelector('[data-field="coeff"]').textContent = coeff !== null ? fmtCoeff(coeff) : '—';
    const eff = (coeff !== null && rolls > 0) ? +(coeff * rolls).toFixed(2) : '—';
    div.querySelector('[data-field="eff"]').textContent = eff;
    updateFooter();
  }
}

// ── 儲存（POST no-cors）──────────────────────────────────────
function onSave() {
  const date = document.getElementById('prod-date').value;
  if (!date || !currentEmp) return;
  const validRows = getRows().filter(r => r.category && r.spec && r.rolls > 0 && r.coeff > 0);
  if (!validRows.length) { showMsg('沒有有效的產量記錄', 'error'); return; }

  const workHours      = parseFloat(document.getElementById('work-hours').value)      || 0;
  const abnormalHours  = parseFloat(document.getElementById('abnormal-hours').value)  || 0;
  const abnormalReason = document.getElementById('abnormal-reason').value.trim();
  const newbieDeduct   = parseFloat(document.getElementById('newbie-deduct').value)   || '';

  const btn = document.getElementById('btn-save');
  btn.disabled = true; btn.textContent = '儲存中…';

  const records = validRows.map(r => ({
    empId: currentEmp.id, empName: currentEmp.name,
    workHours, abnormalHours,
    category: r.category, spec: r.spec, coeff: r.coeff, rolls: r.rolls, efficiency: r.efficiency,
    abnormalReason, newbieDeduct,
  }));

  fetch(GAS_URL, {
    method: 'POST', mode: 'no-cors',
    body: JSON.stringify({ action: 'saveRecords', records, date, system: 'backing' }),
  }).catch(() => {});

  showMsg(`已送出 ${validRows.length} 筆（約 3 秒後寫入 Sheets）`, 'success');
  clearRows();
  document.getElementById('emp-input').value = '';
  document.getElementById('work-hours').value = '';
  document.getElementById('abnormal-hours').value = '';
  document.getElementById('abnormal-reason').value = '';
  document.getElementById('newbie-deduct').value = '';
  currentEmp = null;
  document.getElementById('header-hint').textContent = '請先選擇日期與員工';
  updateFooter();
  btn.textContent = '儲存紀錄';
}

function fmtCoeff(n) {
  const s = n.toString();
  return s.includes('.') ? s : s + '.0';
}

// ── JSONP 工具 ────────────────────────────────────────────────
function jsonpCall(url, cb) {
  const name = '_cb_' + Date.now() + '_' + Math.random().toString(36).slice(2);
  const s = document.createElement('script');
  window[name] = data => { delete window[name]; s.remove(); cb(data); };
  s.onerror  = ()    => { delete window[name]; s.remove(); };
  s.src = url + '&callback=' + name;
  document.head.appendChild(s);
}

function showMsg(text, type) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'toast-msg show-' + type;
  setTimeout(() => { el.className = 'toast-msg'; }, 3000);
}
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
