<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>效率報表總表</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.8/dist/flatly/bootstrap.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
  <style>
    /* welding / backing chart tabs */
    .chart-wrap { position: relative; height: 200px; }
    .td-num  { text-align: right; font-weight: 600; }
    .td-sub  { text-align: right; color: #6c757d; }
    .tr-total td { color: #0d6efd; font-weight: 700; background: #e7f1ff; }
    /* slitting report */
    .eff-high { color: #198754; font-weight: 600; }
    .eff-mid  { color: #fd7e14; font-weight: 600; }
    .eff-low  { color: #dc3545; font-weight: 600; }
    .col-inv  { background: #f8f9fa; }
    .month-row { cursor: pointer; }
    .month-row:hover td { background: #eaf0fb !important; }
    .month-row.active td { background: #2c3e50 !important; color: #fff; }
    .month-row.active .eff-high,
    .month-row.active .eff-mid,
    .month-row.active .eff-low { color: #fff; }
    .month-row.active .col-inv { background: #3d5166 !important; }
    th small { display: block; font-weight: 400; color: #6c757d; font-size: 10px; }
    #tab-slitting tfoot td { background: #e9ecef; font-weight: 600; }
    #tab-slitting table { font-size: 13px; width: 100%; }
    #tab-slitting th { font-size: 12px; }
    .no-data { color: #ced4da; }
    .no-data-div { color: #adb5bd; text-align: center; padding: 20px; font-size: 13px; }
    .day-holiday td { background: #ffe5e5 !important; color: #b02020 !important; }
    .day-holiday .col-inv { background: #ffd8d8 !important; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top shadow-sm bg-white">
  <div class="container-fluid">
    <span class="navbar-brand fw-bold">效率報表總表</span>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navLinks">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navLinks">
      <div class="navbar-nav ms-auto gap-1">
        <a class="nav-link" href="index.html">分條填報</a>
        <a class="nav-link" href="welding.html">焊接填報</a>
        <a class="nav-link" href="backing.html">褙膠填報</a>
        <a class="nav-link" href="process.html">裁切填報</a>
        <a class="nav-link" href="cutting.html">切勾填報</a>
        <a class="nav-link text-success fw-semibold" href="https://docs.google.com/spreadsheets/d/1mxgL9IR2uggzlIVRss0RDtb-3OX2ReUV0KpEFyrmm9k/edit" target="_blank">📊 Sheet</a>
      </div>
    </div>
  </div>
</nav>

<div class="container-fluid px-3 py-3">

  <!-- Tab 切換 -->
  <ul class="nav nav-tabs mb-3" id="reportTabs">
    <li class="nav-item">
      <button class="nav-link active" onclick="switchTab('slitting', this)">分條</button>
    </li>
    <li class="nav-item">
      <button class="nav-link" onclick="switchTab('welding', this)">超音波焊接</button>
    </li>
    <li class="nav-item">
      <button class="nav-link" onclick="switchTab('backing', this)">自黏褙膠</button>
    </li>
  </ul>

  <!-- ── 分條 Tab ── -->
  <div id="tab-slitting">

    <div class="d-flex align-items-center mb-2 gap-3 flex-wrap">
      <h6 class="mb-0 fw-bold" id="slitting-year-label">載入中…</h6>
      <span class="badge bg-secondary">目標 6.3 捲／時</span>
      <div class="ms-auto small">
        <span class="me-2 eff-high">■ ≥100%</span>
        <span class="me-2 eff-mid">■ 90–99%</span>
        <span class="eff-low">■ &lt;90%</span>
        <span class="ms-2" style="color:#b02020;font-weight:600">■ 假日</span>
      </div>
    </div>

    <!-- 月報表 -->
    <div class="table-responsive mb-1">
    <table class="table table-sm table-bordered align-middle mb-0">
      <thead class="table-dark text-center">
        <tr>
          <th rowspan="2" style="width:55px;vertical-align:middle">月份</th>
          <th colspan="2" class="col-inv">庫存參考</th>
          <th colspan="4">效率計算</th>
        </tr>
        <tr>
          <th class="col-inv">捲數<small>J</small></th>
          <th class="col-inv">捲數／時<small>J ÷ P</small></th>
          <th>效率捲數<small>O（×係數）</small></th>
          <th>加權工時<small>P</small></th>
          <th>效率捲／時<small>O ÷ P</small></th>
          <th>效率%<small>O ÷ P ÷ 6.3</small></th>
        </tr>
      </thead>
      <tbody id="slitting-monthly-body">
        <tr><td colspan="7" class="text-center text-muted py-3">載入中…</td></tr>
      </tbody>
      <tfoot id="slitting-monthly-foot"></tfoot>
    </table>
    </div>

    <!-- 日報標題 -->
    <div class="small text-muted mt-3 mb-1" id="slitting-daily-title">▼ 日報</div>

    <!-- 日報表 -->
    <div class="table-responsive">
    <table class="table table-sm table-bordered align-middle mb-0">
      <thead class="table-primary text-center">
        <tr>
          <th rowspan="2" style="width:55px;vertical-align:middle">日期</th>
          <th rowspan="2" style="width:45px;vertical-align:middle">機台<br>數量</th>
          <th colspan="2" class="col-inv">庫存參考</th>
          <th colspan="4">效率計算</th>
        </tr>
        <tr>
          <th class="col-inv">捲數<small>J</small></th>
          <th class="col-inv">捲數／時<small>J ÷ P</small></th>
          <th>效率捲數<small>O</small></th>
          <th>加權工時<small>P</small></th>
          <th>效率捲／時<small>O ÷ P</small></th>
          <th>效率%<small>O ÷ P ÷ 6.3</small></th>
        </tr>
      </thead>
      <tbody id="slitting-daily-body">
        <tr><td colspan="8" class="text-center text-muted py-3">載入中…</td></tr>
      </tbody>
      <tfoot id="slitting-daily-foot"></tfoot>
    </table>
    </div>

  </div><!-- /tab-slitting -->

  <!-- ── 焊接 Tab ── -->
  <div id="tab-welding" style="display:none">
    <div class="card shadow-sm mb-3">
      <div class="card-body">
        <div class="text-muted small mb-2" id="year-title-welding">載入中…</div>
        <div class="chart-wrap"><canvas id="chart-welding"></canvas></div>
      </div>
    </div>
    <div class="card shadow-sm">
      <div class="card-body">
        <div class="text-muted small mb-2" id="month-title-welding">當月日報</div>
        <div id="daily-welding"><div class="no-data-div">載入中…</div></div>
      </div>
    </div>
  </div>

  <!-- ── 褙膠 Tab ── -->
  <div id="tab-backing" style="display:none">
    <div class="card shadow-sm mb-3">
      <div class="card-body">
        <div class="text-muted small mb-2" id="year-title-backing">載入中…</div>
        <div class="chart-wrap"><canvas id="chart-backing"></canvas></div>
      </div>
    </div>
    <div class="card shadow-sm">
      <div class="card-body">
        <div class="text-muted small mb-2" id="month-title-backing">當月日報</div>
        <div id="daily-backing"><div class="no-data-div">載入中…</div></div>
      </div>
    </div>
  </div>

</div><!-- /container-fluid -->

<script>
const GAS_URL     = 'https://script.google.com/macros/s/AKfycbyKEIcvpKEeTG2iOdyEkIP93ofx1oCl4qLvs3WPvYw930uV8UY--xzYYR8Bgi1cRcol/exec';
const MONTH_NAMES = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
const TARGET_SLIT = 6.3;

const charts = {};

// ── Tab 切換 ──────────────────────────────────────────────────────────────────
function switchTab(system, btn) {
  ['slitting','welding','backing'].forEach(s => {
    document.getElementById(`tab-${s}`).style.display = s === system ? '' : 'none';
  });
  document.querySelectorAll('#reportTabs .nav-link').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (charts[system]) setTimeout(() => charts[system].resize(), 50);
}

// ── 分條報表 ─────────────────────────────────────────────────────────────────
function loadSlittingReport() {
  jsonpCall(GAS_URL + '?action=getSlittingReport', renderSlittingReport);
}

function fmt0(v) { return Math.round(v).toLocaleString(); }
function fmt2(v) { return v.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2}); }

function renderSlittingReport(data) {
  const { monthly, daily, machineCounts = {}, currentMonth, currentYear } = data;

  document.getElementById('slitting-year-label').textContent = `${currentYear} 年分條效率月報`;
  document.getElementById('slitting-daily-title').textContent =
    `▼ ${currentYear}年 ${currentMonth}月 日報`;

  // 月報 rows
  let ytdR = 0, ytdE = 0, ytdH = 0, ytdOK = false;
  const mrows = monthly.map(m => {
    if (!m.hasData) {
      return `<tr class="no-data text-center month-row" onclick="selectSlittingMonth(this,${m.month})">
        <td class="text-dark fw-semibold">${m.month} 月</td>
        <td class="col-inv">—</td><td class="col-inv">—</td>
        <td>—</td><td>—</td><td>—</td><td>—</td>
      </tr>`;
    }
    ytdR += m.rolls; ytdE += m.effRolls; ytdH += m.weightedHours; ytdOK = true;
    const jPerP = m.weightedHours > 0 ? m.rolls / m.weightedHours : 0;
    const oPerP = m.weightedHours > 0 ? m.effRolls / m.weightedHours : 0;
    const eff   = oPerP / TARGET_SLIT;
    const cls   = eff >= 1 ? 'eff-high' : eff >= 0.9 ? 'eff-mid' : 'eff-low';
    const act   = m.month === currentMonth ? ' active' : '';
    return `<tr class="text-center month-row${act}" onclick="selectSlittingMonth(this,${m.month})">
      <td class="fw-semibold">${m.month} 月</td>
      <td class="text-end col-inv">${fmt0(m.rolls)}</td>
      <td class="text-end col-inv">${jPerP.toFixed(2)}</td>
      <td class="text-end">${fmt2(m.effRolls)}</td>
      <td class="text-end">${fmt2(m.weightedHours)}</td>
      <td class="text-end">${oPerP.toFixed(2)}</td>
      <td class="${cls}">${(eff * 100).toFixed(1)}%</td>
    </tr>`;
  });
  document.getElementById('slitting-monthly-body').innerHTML = mrows.join('');

  // 月報 tfoot（年度累計）
  const mfoot = document.getElementById('slitting-monthly-foot');
  if (ytdOK && ytdH > 0) {
    const jPerP = ytdR / ytdH;
    const oPerP = ytdE / ytdH;
    const eff   = oPerP / TARGET_SLIT;
    const cls   = eff >= 1 ? 'eff-high' : eff >= 0.9 ? 'eff-mid' : 'eff-low';
    mfoot.innerHTML = `<tr class="text-center">
      <td>年度累計</td>
      <td class="text-end col-inv">${fmt0(ytdR)}</td>
      <td class="text-end col-inv">${jPerP.toFixed(2)}</td>
      <td class="text-end">${fmt2(ytdE)}</td>
      <td class="text-end">${fmt2(ytdH)}</td>
      <td class="text-end">${oPerP.toFixed(2)}</td>
      <td class="${cls}">${(eff * 100).toFixed(1)}%</td>
    </tr>`;
  }

  // 日報 rows（當月 1 到 daysInMonth 每天都顯示）
  const daysInMonth = new Date(currentYear, currentMonth, 0).getDate();
  const dMap = {};
  daily.forEach(d => { dMap[d.day] = d; });

  const today = new Date();
  const todayYear = today.getFullYear();
  const todayMonth = today.getMonth() + 1;
  const todayDay = today.getDate();

  let dR = 0, dE = 0, dH = 0, dOK = false;
  const drows = [];
  for (let day = 1; day <= daysInMonth; day++) {
    const dd = dMap[day];
    const dayKey = `${String(currentMonth).padStart(2,'0')}/${String(day).padStart(2,'0')}`;
    const machines = machineCounts[dayKey] || 0;

    const dateObj  = new Date(currentYear, currentMonth - 1, day);
    const isSunday = dateObj.getDay() === 0;
    const isToday  = currentYear === todayYear && currentMonth === todayMonth && day === todayDay;
    const isPast   = !isToday && (
      currentYear < todayYear ||
      (currentYear === todayYear && currentMonth < todayMonth) ||
      (currentYear === todayYear && currentMonth === todayMonth && day < todayDay)
    );
    const isHoliday = !dd && (isSunday || isPast);

    if (dd) {
      dR += dd.rolls; dE += dd.effRolls; dH += dd.weightedHours; dOK = true;
      const jPerP = dd.weightedHours > 0 ? dd.rolls / dd.weightedHours : 0;
      const oPerP = dd.weightedHours > 0 ? dd.effRolls / dd.weightedHours : 0;
      const eff   = oPerP / TARGET_SLIT;
      const cls   = eff >= 1 ? 'eff-high' : eff >= 0.9 ? 'eff-mid' : 'eff-low';
      drows.push(`<tr>
        <td class="text-center fw-semibold">${currentMonth}/${day}</td>
        <td class="text-center">${machines || '—'}</td>
        <td class="text-end col-inv">${fmt0(dd.rolls)}</td>
        <td class="text-end col-inv">${jPerP.toFixed(2)}</td>
        <td class="text-end">${fmt2(dd.effRolls)}</td>
        <td class="text-end">${fmt2(dd.weightedHours)}</td>
        <td class="text-end">${oPerP.toFixed(2)}</td>
        <td class="text-center ${cls}">${(eff * 100).toFixed(1)}%</td>
      </tr>`);
    } else if (isHoliday) {
      drows.push(`<tr class="day-holiday text-center">
        <td class="fw-semibold">${currentMonth}/${day}</td><td>—</td>
        <td class="col-inv">—</td><td class="col-inv">—</td>
        <td>—</td><td>—</td><td>—</td><td>—</td>
      </tr>`);
    } else {
      drows.push(`<tr class="no-data text-center">
        <td class="text-dark fw-semibold">${currentMonth}/${day}</td><td>—</td>
        <td class="col-inv">—</td><td class="col-inv">—</td>
        <td>—</td><td>—</td><td>—</td><td>—</td>
      </tr>`);
    }
  }
  document.getElementById('slitting-daily-body').innerHTML = drows.join('');

  // 日報 tfoot（月合計）
  const dfoot = document.getElementById('slitting-daily-foot');
  if (dOK && dH > 0) {
    const jPerP = dR / dH;
    const oPerP = dE / dH;
    const eff   = oPerP / TARGET_SLIT;
    const cls   = eff >= 1 ? 'eff-high' : eff >= 0.9 ? 'eff-mid' : 'eff-low';
    dfoot.innerHTML = `<tr class="text-center">
      <td>月合計</td><td class="text-center">—</td>
      <td class="text-end col-inv">${fmt0(dR)}</td>
      <td class="text-end col-inv">${jPerP.toFixed(2)}</td>
      <td class="text-end">${fmt2(dE)}</td>
      <td class="text-end">${fmt2(dH)}</td>
      <td class="text-end">${oPerP.toFixed(2)}</td>
      <td class="${cls}">${(eff * 100).toFixed(1)}%</td>
    </tr>`;
  }
}

function selectSlittingMonth(el, m) {
  document.querySelectorAll('#tab-slitting .month-row').forEach(r => r.classList.remove('active'));
  el.classList.add('active');
}

// ── 焊接／褙膠 報表 ───────────────────────────────────────────────────────────
function loadReport(system) {
  jsonpCall(GAS_URL + '?action=getReport&system=' + system, data => renderReport(system, data));
}

function renderReport(system, data) {
  const { monthly, daily, currentMonth, currentYear } = data;

  document.getElementById(`year-title-${system}`).textContent =
    `${currentYear} 年各月效率合計`;
  document.getElementById(`month-title-${system}`).textContent =
    `${currentMonth} 月日報`;

  const allMonths    = Array.from({length: 12}, (_, i) => i + 1);
  const monthMap     = {};
  monthly.forEach(m => { monthMap[m.month] = m.total; });
  const labels       = allMonths.map(m => MONTH_NAMES[m - 1]);
  const values       = allMonths.map(m => monthMap[m] || 0);
  const bgColors     = allMonths.map(m => m === currentMonth ? 'rgba(13,110,253,.8)' : 'rgba(13,110,253,.25)');
  const borderColors = allMonths.map(m => m === currentMonth ? '#0a58ca' : '#6ea8fe');

  const ctx = document.getElementById(`chart-${system}`).getContext('2d');
  if (charts[system]) charts[system].destroy();
  charts[system] = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        data: values,
        backgroundColor: bgColors,
        borderColor: borderColors,
        borderWidth: 1,
        borderRadius: 3,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: c => ` 效率合計：${c.parsed.y.toLocaleString()}` } }
      },
      scales: {
        x: { ticks: { color: '#6c757d', font: { size: 11 } }, grid: { color: '#dee2e6' } },
        y: { ticks: { color: '#6c757d' }, grid: { color: '#dee2e6' }, beginAtZero: true }
      }
    }
  });

  const container = document.getElementById(`daily-${system}`);
  if (!daily.length) {
    container.innerHTML = '<div class="no-data-div">本月尚無資料</div>';
    return;
  }

  let monthTotal = 0;
  const rows = daily.map(d => {
    monthTotal += d.total;
    return `<tr>
      <td style="font-size:13px">${currentMonth}/${d.date.split('/')[1]}</td>
      <td class="td-num" style="font-size:13px">${d.total.toLocaleString(undefined, {minimumFractionDigits:1, maximumFractionDigits:1})}</td>
      <td class="td-sub" style="font-size:13px">${d.headcount} 人</td>
    </tr>`;
  }).join('');

  container.innerHTML = `
    <table class="table table-sm table-hover mb-0">
      <thead><tr>
        <th style="font-size:12px;color:#6c757d;font-weight:500">日期</th>
        <th class="text-end" style="font-size:12px;color:#6c757d;font-weight:500">效率合計</th>
        <th class="text-end" style="font-size:12px;color:#6c757d;font-weight:500">人數</th>
      </tr></thead>
      <tbody>
        ${rows}
        <tr class="tr-total">
          <td style="font-size:13px">${currentMonth} 月合計</td>
          <td class="td-num" style="font-size:13px">${monthTotal.toLocaleString(undefined, {minimumFractionDigits:1, maximumFractionDigits:1})}</td>
          <td class="td-sub" style="font-size:13px">—</td>
        </tr>
      </tbody>
    </table>
  `;
}

// ── JSONP 工具 ────────────────────────────────────────────────────────────────
function jsonpCall(url, cb) {
  const name = '_cb_' + Date.now() + '_' + Math.random().toString(36).slice(2);
  const s = document.createElement('script');
  window[name] = data => { delete window[name]; s.remove(); cb(data); };
  s.onerror = () => { delete window[name]; s.remove(); };
  s.src = url + '&callback=' + name;
  document.head.appendChild(s);
}

// ── 啟動 ──────────────────────────────────────────────────────────────────────
loadSlittingReport();
loadReport('welding');
loadReport('backing');
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
