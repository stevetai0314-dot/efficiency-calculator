<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>效率換算工具</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, -apple-system, sans-serif; background: #111827; color: #e5e7eb; min-height: 100vh; display: flex; flex-direction: column; }

/* 頂部 */
#header { background: #1f2937; border-bottom: 1px solid #374151; padding: 12px 20px; display: flex; gap: 16px; align-items: flex-end; flex-shrink: 0; flex-wrap: wrap; }
#header label { font-size: 11px; color: #9ca3af; display: block; margin-bottom: 4px; letter-spacing: 0.05em; }
#header input[type="date"], #header select { background: #111827; border: 1px solid #374151; border-radius: 6px; color: #e5e7eb; padding: 7px 10px; font-size: 14px; }
#header input[type="date"]:focus, #header select:focus { outline: none; border-color: #3b82f6; }
#emp-select { min-width: 200px; }
#header-hint { font-size: 12px; color: #6b7280; align-self: center; margin-left: auto; }

/* 主內容 */
#main { flex: 1; padding: 16px 20px; overflow-y: auto; }

/* 表格 */
.table-head { display: grid; grid-template-columns: 200px 180px 90px 68px 100px 36px; gap: 6px; padding-bottom: 8px; border-bottom: 1px solid #374151; margin-bottom: 8px; }
.table-head span { font-size: 11px; color: #6b7280; text-align: center; letter-spacing: 0.04em; }
.table-head span:first-child { text-align: left; }

.row { display: grid; grid-template-columns: 200px 180px 90px 68px 100px 36px; gap: 6px; margin-bottom: 6px; align-items: center; }
.row input[type="text"], .row input[type="number"], .row select {
  width: 100%; background: #1f2937; border: 1px solid #374151; border-radius: 6px;
  color: #e5e7eb; padding: 7px 9px; font-size: 14px;
}
.row input[type="number"] { text-align: right; }
.row input:focus, .row select:focus { outline: none; border-color: #3b82f6; }
.cell-coeff, .cell-eff { border-radius: 6px; padding: 7px 9px; font-size: 14px; text-align: center; }
.cell-coeff { background: #111827; border: 1px solid #1f2937; color: #60a5fa; }
.cell-eff   { background: #1e3a5f; border: 1px solid #1e3a5f; color: #fff; font-weight: 600; }
.btn-del { background: none; border: none; color: #4b5563; font-size: 18px; cursor: pointer; padding: 0 4px; line-height: 1; }
.btn-del:hover { color: #ef4444; }

/* Autocomplete */
.spec-wrap { position: relative; }
.ac-list { position: absolute; top: 100%; left: 0; right: 0; background: #1f2937; border: 1px solid #374151; border-top: none; border-radius: 0 0 6px 6px; z-index: 100; max-height: 200px; overflow-y: auto; display: none; box-shadow: 0 8px 16px rgba(0,0,0,0.4); }
.ac-item { padding: 7px 10px; font-size: 13px; cursor: pointer; }
.ac-item:hover, .ac-item.ac-active { background: #1e3a5f; }
.ac-item mark { background: none; color: #60a5fa; font-weight: 700; }

/* 底部 */
#footer { background: #1f2937; border-top: 1px solid #374151; padding: 12px 20px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
#summary { font-size: 13px; color: #9ca3af; }
#summary b { color: #e5e7eb; }
#total-label { color: #9ca3af; }
#total-eff { color: #60a5fa; font-size: 17px; font-weight: 700; margin-left: 4px; }
#btn-save { margin-left: auto; background: #2563eb; color: #fff; border: none; border-radius: 8px; padding: 9px 28px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background .15s; }
#btn-save:hover:not(:disabled) { background: #1d4ed8; }
#btn-save:disabled { background: #374151; color: #6b7280; cursor: not-allowed; }

/* 狀態訊息 */
#msg { position: fixed; top: 16px; right: 16px; padding: 10px 18px; border-radius: 8px; font-size: 14px; z-index: 200; opacity: 0; transition: opacity .2s; pointer-events: none; }
#msg.show-success { background: #065f46; color: #6ee7b7; opacity: 1; }
#msg.show-error   { background: #7f1d1d; color: #fca5a5; opacity: 1; }
</style>
</head>

const SPEC_KEYS = Object.keys(SPECS);

function lookupCoeff(spec, length) {
  const row = SPECS[spec];
  if (!row) return null;
  const idx = LENGTHS.indexOf(length);
  if (idx === -1) return null;
  return row[idx];
}

// ── 狀態 ─────────────────────────────────────────────────
let employees = [];
let currentEmp = null;
let rowId = 0;

// ── 初始化 ───────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  setDefaultDate();
  loadEmployees();
  document.getElementById('emp-select').addEventListener('change', onEmpChange);
  document.getElementById('btn-save').addEventListener('click', onSave);
});

function setDefaultDate() {
  document.getElementById('prod-date').value = new Date().toLocaleDateString('en-CA');
}

// ── 員工 ─────────────────────────────────────────────────
function loadEmployees() {
  post({ action: 'getEmployees' })
    .then(data => {
      employees = Array.isArray(data) ? data : [];
      const sel = document.getElementById('emp-select');
      employees.forEach(e => {
        const opt = document.createElement('option');
        opt.value = e.id;
        opt.textContent = `${e.name} (${e.id})`;
        sel.appendChild(opt);
      });
    })
    .catch(() => showMsg('員工清單載入失敗', 'error'));
}

function onEmpChange(ev) {
  const id = ev.target.value;
  currentEmp = employees.find(e => e.id === id) || null;
  document.getElementById('header-hint').textContent =
    currentEmp ? `${currentEmp.name} 的班產記錄` : '請先選擇日期與員工';
  clearRows();
  if (currentEmp) addRow();
  updateFooter();
}

// ── 行管理 ────────────────────────────────────────────────
function addRow() {
  const id = ++rowId;
  const div = document.createElement('div');
  div.className = 'row';
  div.dataset.id = id;
  div.innerHTML = `
    <div class="spec-wrap">
      <input class="spec-input" type="text" placeholder="輸入規格…" autocomplete="off" data-field="spec">
      <div class="ac-list" id="ac-${id}"></div>
    </div>
    <select data-field="length">
      <option value="">— 碼長 —</option>
      ${LENGTHS.map(l => `<option value="${l}">${l}</option>`).join('')}
    </select>
    <input type="number" min="0" step="1" placeholder="捲數" data-field="rolls">
    <div class="cell-coeff" data-field="coeff">—</div>
    <div class="cell-eff"   data-field="eff">—</div>
    <button class="btn-del" type="button" onclick="deleteRow(${id})" title="刪除">✕</button>
  `;
  document.getElementById('rows').appendChild(div);
  bindRowEvents(div, id);
  div.querySelector('[data-field="spec"]').focus();
}

function deleteRow(id) {
  const el = document.querySelector(`.row[data-id="${id}"]`);
  if (el) el.remove();
  updateFooter();
}

function clearRows() {
  document.getElementById('rows').innerHTML = '';
  rowId = 0;
}

function getRows() {
  return Array.from(document.querySelectorAll('.row')).map(row => ({
    spec:       row.querySelector('[data-field="spec"]').value.trim(),
    length:     row.querySelector('[data-field="length"]').value,
    rolls:      parseFloat(row.querySelector('[data-field="rolls"]').value) || 0,
    coeff:      parseFloat(row.querySelector('[data-field="coeff"]').textContent) || 0,
    efficiency: parseFloat(row.querySelector('[data-field="eff"]').textContent) || 0,
  }));
}

function updateFooter() {
  const valid = getRows().filter(r => r.efficiency > 0);
  const total = valid.reduce((s, r) => s + r.efficiency, 0);
  document.getElementById('row-count').textContent = valid.length;
  document.getElementById('total-eff').textContent = total.toFixed(2);
  const canSave = !!currentEmp && valid.length > 0 && !!document.getElementById('prod-date').value;
  document.getElementById('btn-save').disabled = !canSave;
}

// ── 行事件（autocomplete + 計算 + Tab 跳行）────────────────
function bindRowEvents(div, id) {
  const specInput  = div.querySelector('[data-field="spec"]');
  const lenSel     = div.querySelector('[data-field="length"]');
  const rollsInput = div.querySelector('[data-field="rolls"]');
  const acList     = document.getElementById(`ac-${id}`);
  let acIndex = -1;

  // ── autocomplete ──
  specInput.addEventListener('input', () => {
    const q = specInput.value.trim().toLowerCase();
    acIndex = -1;
    if (!q) { acList.style.display = 'none'; return; }
    const matches = SPEC_KEYS.filter(k => k.toLowerCase().includes(q));
    if (!matches.length) { acList.style.display = 'none'; return; }
    acList.innerHTML = matches.slice(0, 20).map((k, i) => {
      const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
      const hi = k.replace(re, '<mark>$1</mark>');
      return `<div class="ac-item" data-val="${k}" data-idx="${i}">${hi}</div>`;
    }).join('');
    acList.style.display = 'block';
    acList.querySelectorAll('.ac-item').forEach(item => {
      item.addEventListener('mousedown', e => {
        e.preventDefault();
        confirmSpec(item.dataset.val);
      });
    });
  });

  specInput.addEventListener('keydown', e => {
    const items = acList.querySelectorAll('.ac-item');
    if (!items.length || acList.style.display === 'none') return;
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      acIndex = Math.min(acIndex + 1, items.length - 1);
      items.forEach((el, i) => el.classList.toggle('ac-active', i === acIndex));
      if (items[acIndex]) items[acIndex].scrollIntoView({ block: 'nearest' });
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      acIndex = Math.max(acIndex - 1, 0);
      items.forEach((el, i) => el.classList.toggle('ac-active', i === acIndex));
      if (items[acIndex]) items[acIndex].scrollIntoView({ block: 'nearest' });
    } else if (e.key === 'Enter' || (e.key === 'Tab' && acIndex >= 0)) {
      if (acIndex >= 0 && items[acIndex]) {
        e.preventDefault();
        confirmSpec(items[acIndex].dataset.val);
      } else {
        acList.style.display = 'none';
      }
    } else if (e.key === 'Escape') {
      acList.style.display = 'none';
    }
  });

  specInput.addEventListener('blur', () => {
    setTimeout(() => { acList.style.display = 'none'; }, 150);
  });

  function confirmSpec(val) {
    specInput.value = val;
    acList.style.display = 'none';
    lenSel.focus();
    recalc();
  }

  // ── 計算 ──
  function recalc() {
    const spec  = specInput.value.trim();
    const len   = lenSel.value;
    const rolls = parseFloat(rollsInput.value) || 0;
    const coeff = (spec && len) ? lookupCoeff(spec, len) : null;
    div.querySelector('[data-field="coeff"]').textContent = coeff !== null ? coeff : '—';
    const eff = (coeff !== null && rolls > 0) ? +(coeff * rolls).toFixed(2) : '—';
    div.querySelector('[data-field="eff"]').textContent = eff;
    updateFooter();
  }

  lenSel.addEventListener('change', () => { recalc(); if (lenSel.value) rollsInput.focus(); });
  rollsInput.addEventListener('input', recalc);

  // ── Tab 從捲數跳下一行 ──
  rollsInput.addEventListener('keydown', e => {
    if (e.key === 'Tab' && !e.shiftKey) {
      e.preventDefault();
      const allRows = document.querySelectorAll('.row');
      const isLast = div === allRows[allRows.length - 1];
      if (isLast) {
        addRow();
      } else {
        div.nextElementSibling.querySelector('[data-field="spec"]').focus();
      }
    }
  });
}

// ── 儲存 ─────────────────────────────────────────────────
function onSave() {
  const date = document.getElementById('prod-date').value;
  if (!date || !currentEmp) return;
  const validRows = getRows().filter(r => r.spec && r.length && r.rolls > 0 && r.coeff > 0);
  if (!validRows.length) { showMsg('沒有有效的產量記錄', 'error'); return; }

  const btn = document.getElementById('btn-save');
  btn.disabled = true;
  btn.textContent = '儲存中…';

  const records = validRows.map(r => ({
    empId:      currentEmp.id,
    empName:    currentEmp.name,
    spec:       r.spec,
    length:     r.length,
    rolls:      r.rolls,
    coeff:      r.coeff,
    efficiency: r.efficiency,
  }));

  post({ action: 'saveRecords', records, date })
    .then(res => {
      showMsg(`已儲存 ${res.saved} 筆`, 'success');
      clearRows();
      document.getElementById('emp-select').value = '';
      currentEmp = null;
      document.getElementById('header-hint').textContent = '請先選擇日期與員工';
      updateFooter();
      btn.textContent = '儲存紀錄';
    })
    .catch(() => {
      showMsg('儲存失敗，請重試', 'error');
      btn.disabled = false;
      btn.textContent = '儲存紀錄';
    });
}

// ── 工具 ─────────────────────────────────────────────────
function post(payload) {
  return fetch(window.location.href, {
    method: 'POST',
    body: JSON.stringify(payload),
  }).then(r => r.json());
}

function showMsg(text, type) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = `show-${type}`;
  setTimeout(() => { el.className = ''; }, 3000);
}
</script>
