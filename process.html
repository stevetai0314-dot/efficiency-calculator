<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>裁切填報</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.8/dist/flatly/bootstrap.min.css">
  <style>
    .ac-dropdown {
      position: absolute; top: 100%; left: 0; right: 0;
      background: #fff; border: 1px solid #dee2e6;
      border-radius: 0 0 .375rem .375rem;
      z-index: 300; max-height: 220px; overflow-y: auto;
      display: none; box-shadow: 0 4px 12px rgba(0,0,0,.12);
    }
    .ac-item { padding: 6px 12px; font-size: 13px; cursor: pointer; }
    .ac-item:hover, .ac-item.ac-active { background: #e7f1ff; }
    .ac-item mark { background: none; color: #0d6efd; font-weight: 700; padding: 0; }

    .entry-block {
      border: 1px solid #dee2e6; border-radius: .375rem;
      padding: 6px 8px; margin-bottom: 6px; background: #fff;
    }
    .entry-block:hover { border-color: #9ec5fe; }

    .entry-row1 {
      display: grid;
      grid-template-columns: 220px 200px 200px 130px 120px 32px;
      gap: 6px; align-items: center; margin-bottom: 5px;
    }
    .entry-row2 { display: flex; gap: 8px; align-items: stretch; }
    .entry-group {
      display: flex; gap: 6px; align-items: center;
      border: 1px solid #dee2e6; border-radius: .375rem;
      padding: 5px 8px;
    }
    .entry-group.grp-in  { background: #f0f4ff; border-color: #b6c8f5; }
    .entry-group.grp-out { background: #f0fff4; border-color: #a3d9b1; }
    .field-group { display: flex; flex-direction: column; }
    .entry-label { font-size: 10px; color: #6c757d; margin-bottom: 2px; }

    .abn-row {
      display: grid;
      grid-template-columns: 90px 1fr 30px;
      gap: 6px; align-items: center; margin-bottom: 5px;
    }
    .custom-val { background-color: #fff3cd !important; }

    .toast-msg {
      position: fixed; top: 16px; right: 16px;
      padding: 10px 18px; border-radius: 8px; font-size: 14px;
      z-index: 9999; opacity: 0; transition: opacity .2s; pointer-events: none;
    }
    .toast-msg.show-success { background: #d1e7dd; color: #0f5132; opacity: 1; border: 1px solid #badbcc; }
    .toast-msg.show-error   { background: #f8d7da; color: #842029; opacity: 1; border: 1px solid #f5c2c7; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top shadow-sm bg-white">
  <div class="container-fluid">
    <span class="navbar-brand fw-bold">裁切填報</span>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navLinks">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navLinks">
      <div class="navbar-nav ms-auto gap-1">
        <a class="nav-link" href="index.html">分條填報</a>
        <a class="nav-link" href="welding.html">焊接填報</a>
        <a class="nav-link" href="backing.html">褙膠填報</a>
        <a class="nav-link" href="cutting.html">切勾填報</a>
        <a class="nav-link" href="report.html">報表總表</a>
        <a class="nav-link text-success fw-semibold" href="https://docs.google.com/spreadsheets/d/1mxgL9IR2uggzlIVRss0RDtb-3OX2ReUV0KpEFyrmm9k/edit" target="_blank">📊 Sheet</a>
      </div>
    </div>
  </div>
</nav>

<div class="container-fluid px-3 py-3">

  <!-- 頂部 -->
  <div class="card shadow-sm mb-3">
    <div class="card-body py-2">
      <div class="row g-2 align-items-end flex-wrap">
        <div class="col-auto">
          <label class="form-label small mb-1">生產日期</label>
          <input type="date" id="prod-date" class="form-control form-control-sm" style="width:150px">
        </div>
        <div class="col-auto" style="min-width:220px; position:relative">
          <label class="form-label small mb-1">員工（工號或姓名）</label>
          <input type="text" id="emp-input" class="form-control form-control-sm" placeholder="輸入工號或姓名…" autocomplete="off">
          <div class="ac-dropdown" id="emp-ac"></div>
        </div>
        <div class="col">
          <span id="header-hint" class="text-muted small">請先選擇日期與員工</span>
        </div>
      </div>
    </div>
  </div>

  <!-- 異常時段 -->
  <div class="card shadow-sm mb-3">
    <div class="card-body py-2 px-3">
      <div class="d-flex align-items-center mb-2">
        <span class="small fw-semibold text-muted me-3">異常時段</span>
        <button class="btn btn-sm btn-outline-secondary py-0 px-2" onclick="addAbnRow()">＋ 新增異常</button>
      </div>
      <div id="abn-rows"></div>
    </div>
  </div>

  <!-- 明細列 -->
  <div class="card shadow-sm mb-3">
    <div class="card-body py-2 px-3">
      <div id="loading-specs" class="text-muted small text-center py-2">載入資料中…</div>
      <div id="rows"></div>
      <button id="btn-add-row" class="btn btn-sm btn-outline-primary mt-1" onclick="addRow()" style="display:none">
        ＋ 新增品項
      </button>
    </div>
  </div>

  <!-- 底部 -->
  <div class="card shadow-sm">
    <div class="card-body py-2 d-flex align-items-center">
      <span class="text-muted small me-3">共 <strong id="row-count">0</strong> 筆</span>
      <button id="btn-save" class="btn btn-primary ms-auto">儲存紀錄</button>
    </div>
  </div>
</div>

<div id="msg" class="toast-msg"></div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyKEIcvpKEeTG2iOdyEkIP93ofx1oCl4qLvs3WPvYw930uV8UY--xzYYR8Bgi1cRcol/exec';

let PROCESSES = [];
let SPECS     = [];
let LENGTHS   = [];
let COLORS    = [];
let specsReady = false;

let employees  = [];
let currentEmp = null;
let rowId = 0;
let abnId = 0;

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('prod-date').value = new Date().toLocaleDateString('en-CA');
  loadEmployees();
  loadSpecs();
  bindEmpAutocomplete();
  document.getElementById('btn-save').addEventListener('click', onSave);
});

// ── 載入資料 ─────────────────────────────────────────────────
function loadSpecs() {
  jsonpCall(GAS_URL + '?action=getSpecs&system=process', data => {
    if (data) {
      PROCESSES  = data.processes || [];
      SPECS      = data.specs     || [];
      LENGTHS    = data.lengths   || [];
      COLORS     = data.colors    || [];
      specsReady = true;
      document.getElementById('loading-specs').style.display = 'none';
      document.getElementById('btn-add-row').style.display = '';
      if (currentEmp) addRow();
    } else {
      document.getElementById('loading-specs').textContent = '資料載入失敗，請重新整理';
    }
  });
}

function loadEmployees() {
  jsonpCall(GAS_URL + '?action=getEmployees', data => {
    employees = Array.isArray(data) ? data : [];
  });
}

// ── 員工自動補全 ─────────────────────────────────────────────
function bindEmpAutocomplete() {
  const input = document.getElementById('emp-input');
  const ac    = document.getElementById('emp-ac');
  let acIdx = -1;

  input.addEventListener('input', () => {
    const q = input.value.trim().toLowerCase();
    acIdx = -1;
    if (!q) { ac.style.display = 'none'; return; }
    const matches = employees.filter(e =>
      e.id.toLowerCase().includes(q) || e.name.toLowerCase().includes(q)
    );
    if (!matches.length) { ac.style.display = 'none'; return; }
    const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
    ac.innerHTML = matches.slice(0, 20).map((e, i) =>
      `<div class="ac-item" data-id="${e.id}" data-idx="${i}">
        ${e.id.replace(re,'<mark>$1</mark>')} ${e.name.replace(re,'<mark>$1</mark>')}
      </div>`
    ).join('');
    ac.style.display = 'block';
    ac.querySelectorAll('.ac-item').forEach(item =>
      item.addEventListener('mousedown', ev => { ev.preventDefault(); selectEmp(item.dataset.id); })
    );
  });

  input.addEventListener('keydown', e => {
    const items = ac.querySelectorAll('.ac-item');
    if (!items.length || ac.style.display === 'none') return;
    if (e.key === 'ArrowDown') { e.preventDefault(); acIdx = Math.min(acIdx+1, items.length-1); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); acIdx = Math.max(acIdx-1, 0); }
    else if ((e.key === 'Enter' || e.key === 'Tab') && acIdx >= 0) {
      e.preventDefault(); selectEmp(items[acIdx].dataset.id); return;
    } else if (e.key === 'Escape') { ac.style.display = 'none'; return; }
    items.forEach((el, i) => el.classList.toggle('ac-active', i === acIdx));
    if (items[acIdx]) items[acIdx].scrollIntoView({ block: 'nearest' });
  });

  input.addEventListener('blur', () => setTimeout(() => { ac.style.display = 'none'; }, 150));
}

function selectEmp(id) {
  const emp = employees.find(e => e.id === id);
  if (!emp) return;
  currentEmp = emp;
  document.getElementById('emp-input').value = `${emp.name} (${emp.id})`;
  document.getElementById('emp-ac').style.display = 'none';
  document.getElementById('header-hint').textContent = `${emp.name} 的班產記錄`;
  clearRows();
  if (specsReady) addRow();
  updateFooter();
}

// ── 異常區段 ─────────────────────────────────────────────────
function addAbnRow() {
  const div = document.createElement('div');
  div.className = 'abn-row';
  div.innerHTML = `
    <input type="number" class="form-control form-control-sm text-end" placeholder="異常時數" min="0" step="0.5">
    <input type="text"   class="form-control form-control-sm" placeholder="原因說明…">
    <button class="btn btn-sm btn-outline-danger py-0 px-2" onclick="this.closest('.abn-row').remove()">✕</button>
  `;
  document.getElementById('abn-rows').appendChild(div);
}

function getAbnData() {
  let total = 0;
  const reasons = [];
  document.querySelectorAll('#abn-rows .abn-row').forEach(r => {
    const h = parseFloat(r.querySelector('input[type="number"]').value) || 0;
    const reason = r.querySelector('input[type="text"]').value.trim();
    total += h;
    if (reason) reasons.push(`${reason}${h ? ' ' + h + 'h' : ''}`);
  });
  return { total, reason: reasons.join('；') };
}

// ── 明細列 ───────────────────────────────────────────────────
function addRow() {
  const id = ++rowId;
  const block = document.createElement('div');
  block.className  = 'entry-block';
  block.dataset.id = id;

  const allBlocks = document.querySelectorAll('.entry-block');
  const prevEnd = allBlocks.length > 0
    ? (allBlocks[allBlocks.length - 1].querySelector('[data-field="end-time"]').value || '')
    : '';

  block.innerHTML = `
    <div class="entry-row1">
      <div class="field-group">
        <div class="entry-label">工序</div>
        <select class="form-select form-select-sm" data-field="process">
          <option value="">— 工序 —</option>
          ${PROCESSES.map(p => `<option value="${p}">${p}</option>`).join('')}
        </select>
      </div>
      <div class="field-group">
        <div class="entry-label">開始時間</div>
        <input type="text" class="form-control form-control-sm" data-field="start-time" value="${prevEnd}" placeholder="08:00" maxlength="5">
      </div>
      <div class="field-group">
        <div class="entry-label">結束時間</div>
        <input type="text" class="form-control form-control-sm" data-field="end-time" placeholder="17:00" maxlength="5">
      </div>
      <div class="field-group">
        <div class="entry-label">訂單號</div>
        <input type="text" class="form-control form-control-sm" data-field="order-no" placeholder="訂單號">
      </div>
      <div class="field-group">
        <div class="entry-label">客戶名稱</div>
        <input type="text" class="form-control form-control-sm" data-field="customer" placeholder="客戶">
      </div>
      <button class="btn btn-sm btn-outline-danger py-0 px-1 align-self-end mb-1" onclick="deleteRow(${id})">✕</button>
    </div>
    <div class="entry-row2">
      <div class="entry-group grp-in">
        <div class="field-group">
          <div class="entry-label">規格</div>
          <input list="spec-list-${id}" class="form-control form-control-sm" data-field="spec" placeholder="規格" autocomplete="off" style="width:120px">
          <datalist id="spec-list-${id}">${SPECS.map(s => `<option value="${s}">`).join('')}</datalist>
        </div>
        <div class="field-group">
          <div class="entry-label">顏色</div>
          <input list="col-list-${id}" class="form-control form-control-sm" data-field="color" placeholder="顏色" autocomplete="off" style="width:80px">
          <datalist id="col-list-${id}">${COLORS.map(c => `<option value="${c}">`).join('')}</datalist>
        </div>
        <div class="field-group">
          <div class="entry-label">碼長</div>
          <input list="len-list-${id}" class="form-control form-control-sm" data-field="length" placeholder="碼長" autocomplete="off" style="width:80px">
          <datalist id="len-list-${id}">${LENGTHS.map(l => `<option value="${l}">`).join('')}</datalist>
        </div>
      </div>
      <div class="entry-group grp-out">
        <div class="field-group">
          <div class="entry-label">捲數</div>
          <input type="number" class="form-control form-control-sm text-center" data-field="rolls" min="0" step="1" placeholder="0" style="width:90px">
        </div>
        <div class="field-group">
          <div class="entry-label">片長</div>
          <input type="number" class="form-control form-control-sm text-center" data-field="sheet-len" min="0" step="1" placeholder="0" style="width:90px">
        </div>
        <div class="field-group">
          <div class="entry-label">片數</div>
          <input type="number" class="form-control form-control-sm text-center" data-field="sheet-cnt" min="0" step="1" placeholder="0" style="width:90px">
        </div>
        <div class="field-group">
          <div class="entry-label">條數</div>
          <input type="number" class="form-control form-control-sm text-center" data-field="strips" min="1" step="1" value="1" style="width:82px">
        </div>
        <div class="field-group">
          <div class="entry-label">刀數</div>
          <input type="number" class="form-control form-control-sm text-center" data-field="cuts" min="0" step="1" placeholder="0" style="width:90px">
        </div>
      </div>
    </div>
  `;
  document.getElementById('rows').appendChild(block);
  bindBlockEvents(block);
  block.querySelector('[data-field="process"]').focus();
  updateFooter();
}

function bindTimeInput(el) {
  el.addEventListener('input', function() {
    const digits = this.value.replace(/\D/g, '').slice(0, 4);
    if (digits.length <= 2) {
      this.value = digits;
    } else {
      this.value = digits.slice(0, 2) + ':' + digits.slice(2);
    }
  });
}

function bindBlockEvents(block) {
  block.querySelectorAll('[data-field="start-time"], [data-field="end-time"]').forEach(bindTimeInput);

  block.querySelector('[data-field="end-time"]').addEventListener('change', e => {
    const allBlocks = Array.from(document.querySelectorAll('.entry-block'));
    const idx = allBlocks.indexOf(block);
    if (idx < allBlocks.length - 1) {
      const nextStart = allBlocks[idx + 1].querySelector('[data-field="start-time"]');
      if (!nextStart.value) nextStart.value = e.target.value;
    }
  });

  block.querySelector('[data-field="cuts"]').addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      e.preventDefault();
      const allBlocks = Array.from(document.querySelectorAll('.entry-block'));
      const idx = allBlocks.indexOf(block);
      if (idx === allBlocks.length - 1) addRow();
      else allBlocks[idx + 1].querySelector('[data-field="process"]').focus();
    }
  });

  [['spec', SPECS], ['color', COLORS], ['length', LENGTHS]].forEach(([field, list]) => {
    block.querySelector(`[data-field="${field}"]`).addEventListener('change', function() {
      this.classList.toggle('custom-val', !!this.value && !list.includes(this.value.trim()));
    });
  });

  block.querySelectorAll('input,select').forEach(el =>
    el.addEventListener('input', updateFooter)
  );
}

function deleteRow(id) {
  document.querySelector(`.entry-block[data-id="${id}"]`)?.remove();
  updateFooter();
}

function clearRows() {
  document.getElementById('rows').innerHTML = '';
  rowId = 0;
}

function getBlocks() {
  return Array.from(document.querySelectorAll('.entry-block')).map(b => ({
    process:  b.querySelector('[data-field="process"]').value,
    startTime:b.querySelector('[data-field="start-time"]').value,
    endTime:  b.querySelector('[data-field="end-time"]').value,
    orderNo:  b.querySelector('[data-field="order-no"]').value.trim(),
    customer: b.querySelector('[data-field="customer"]').value.trim(),
    spec:     b.querySelector('[data-field="spec"]').value.trim(),
    color:    b.querySelector('[data-field="color"]').value.trim(),
    length:   b.querySelector('[data-field="length"]').value.trim(),
    rolls:    parseFloat(b.querySelector('[data-field="rolls"]').value)     || 0,
    sheetLen: parseFloat(b.querySelector('[data-field="sheet-len"]').value) || 0,
    sheetCnt: parseFloat(b.querySelector('[data-field="sheet-cnt"]').value) || 0,
    strips:   parseFloat(b.querySelector('[data-field="strips"]').value)    || 1,
    cuts:     parseFloat(b.querySelector('[data-field="cuts"]').value)      || 0,
  }));
}

function updateFooter() {
  const valid = getBlocks().filter(r => r.process);
  document.getElementById('row-count').textContent = valid.length;
}

function validateAndHint() {
  // 清除舊的紅框
  document.querySelectorAll('.entry-block .is-invalid').forEach(el => el.classList.remove('is-invalid'));

  const missing = [];
  if (!document.getElementById('prod-date').value) missing.push('生產日期');
  if (!currentEmp) missing.push('員工');

  const blocks = Array.from(document.querySelectorAll('.entry-block'));
  const validBlocks = blocks.filter(b => b.querySelector('[data-field="process"]').value);
  if (!validBlocks.length) { missing.push('至少一筆工序'); }

  const REQUIRED_FIELDS = [
    ['spec',      '規格'],
    ['color',     '顏色'],
    ['length',    '碼長'],
    ['rolls',     '捲數'],
    ['sheet-len', '片長'],
    ['sheet-cnt', '片數'],
    ['cuts',      '刀數'],
  ];

  validBlocks.forEach((block, i) => {
    const rowMissing = [];
    REQUIRED_FIELDS.forEach(([field, label]) => {
      const el = block.querySelector(`[data-field="${field}"]`);
      if (!el.value || el.value === '') {
        el.classList.add('is-invalid');
        rowMissing.push(label);
      }
    });
    if (rowMissing.length) missing.push(`第${i + 1}筆缺：${rowMissing.join('、')}`);
  });

  if (missing.length) {
    showMsg(missing.join('　'), 'error');
    return false;
  }
  return true;
}

// ── 儲存 ─────────────────────────────────────────────────────
function onSave() {
  if (!validateAndHint()) return;
  const date = document.getElementById('prod-date').value;
  const validBlocks = getBlocks().filter(r => r.process);

  const abn = getAbnData();
  const btn = document.getElementById('btn-save');
  btn.disabled = true; btn.textContent = '儲存中…';

  const records = validBlocks.map(r => ({
    empId: currentEmp.id, empName: currentEmp.name,
    ...r,
    abnormalHoursTotal: abn.total,
    abnormalReason: abn.reason,
  }));

  fetch(GAS_URL, {
    method: 'POST', mode: 'no-cors',
    body: JSON.stringify({ action: 'saveRecords', records, date, system: 'process' }),
  }).catch(() => {});

  showMsg(`已送出 ${validBlocks.length} 筆（約 3 秒後寫入 Sheets）`, 'success');
  clearRows();
  document.getElementById('emp-input').value = '';
  document.getElementById('abn-rows').innerHTML = '';
  abnId = 0;
  currentEmp = null;
  document.getElementById('header-hint').textContent = '請先選擇日期與員工';
  updateFooter();
  btn.textContent = '儲存紀錄';
}

// ── JSONP 工具 ────────────────────────────────────────────────
function jsonpCall(url, cb) {
  const name = '_cb_' + Date.now() + '_' + Math.random().toString(36).slice(2);
  const s = document.createElement('script');
  window[name] = data => { delete window[name]; s.remove(); cb(data); };
  s.onerror  = ()    => { delete window[name]; s.remove(); cb(null); };
  s.src = url + '&callback=' + name;
  document.head.appendChild(s);
}

function showMsg(text, type) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'toast-msg show-' + type;
  setTimeout(() => { el.className = 'toast-msg'; }, 3000);
}
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
